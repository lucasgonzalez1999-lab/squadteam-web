async function uploadPlan(athId) {
  const p = PLANS[athId];
  const btn = document.getElementById('btn-'+athId);
  const st  = document.getElementById('st-'+athId);
  btn.disabled = true;
  st.className = 'status loading';
  st.textContent = 'Subiendo...';

  try {
    const body = JSON.stringify({
      fields: { data: { stringValue: JSON.stringify(p.plan) } }
    });
    const r = await fetch(`${FB}/plans/${athId}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body
    });
    if (!r.ok) {
      const err = await r.json();
      throw new Error(err.error?.message || r.status);
    }
    st.className = 'status ok';
    st.textContent = '✓ Subido correctamente';
    document.getElementById('card-'+athId).className = 'card done';
    btn.textContent = '✓ Listo';
  } catch(e) {
    st.className = 'status err';
    st.textContent = '✗ Error: ' + e.message;
    document.getElementById('card-'+athId).className = 'card err';
    btn.disabled = false;
  }
}

async function uploadAll() {
  for (const id of Object.keys(PLANS)) await uploadPlan(id);
}

// Render cards
const container = document.getElementById('cards');
for (const [id, p] of Object.entries(PLANS)) {
  const dias = Object.keys(p.plan);
  const diaHtml = dias.map(d => {
    const exs = p.plan[d].map(e => `<span class="tag">${e.name}</span>`).join('');
    return `<div style="margin-bottom:10px"><span class="tag dia">${d}</span><div class="exercises" style="margin-top:6px">${exs}</div></div>`;
  }).join('');

  container.innerHTML += `
    <div class="card" id="card-${id}">
      <h2>${p.name.toUpperCase()} — ${p.dias} DÍAS</h2>
      ${diaHtml}
      <button id="btn-${id}" onclick="uploadPlan('${id}')">↑ Subir plan de ${p.name}</button>
      <div class="status" id="st-${id}"></div>
    </div>`;
}
